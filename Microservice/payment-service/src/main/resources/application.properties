spring.application.name=payment-service
server.port=8089
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
resilience4j.circuitbreaker.instances.paymentGateway.sliding-window-size=4
resilience4j.circuitbreaker.instances.paymentGateway.minimum-number-of-calls=2
resilience4j.circuitbreaker.instances.paymentGateway.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.paymentGateway.wait-duration-in-open-state=10s
management.endpoints.web.exposure.include=health,info,circuitbreakers
